let questions = [];
let current = 0;
let score = 0;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startQuiz() {
  const count = Number(document.getElementById("questionCount").value);
  questions = shuffle([...quizData]).slice(0, count);
  current = 0;
  score = 0;

  document.getElementById("startArea").classList.add("hidden");
  document.getElementById("quizArea").classList.remove("hidden");

  showQuestion();
}

function showQuestion() {
  const q = questions[current];

  document.getElementById("progress").textContent =
    `${current + 1} / ${questions.length} ???????${score}`;

  document.getElementById("question").textContent = q.q;
  document.getElementById("status").textContent = "";

  const choicesBox = document.getElementById("choices");
  choicesBox.innerHTML = "";

  const choices = q.c.map((text, index) => ({
    text,
    originalIndex: index
  }));

  shuffle(choices).forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = choice.text;
    btn.onclick = () => answer(btn, choice.originalIndex);
    choicesBox.appendChild(btn);
  });
}

function answer(button, selectedIndex) {
  const q = questions[current];
  const buttons = document.querySelectorAll(".choice");

  buttons.forEach(btn => btn.disabled = true);

  if (selectedIndex === q.a) {
    button.classList.add("correct");
    document.getElementById("status").textContent = "???";
    score++;
  } else {
    button.classList.add("wrong");
    document.getElementById("status").textContent =
      `????????${q.c[q.a]}?`;

    buttons.forEach(btn => {
      if (btn.textContent === q.c[q.a]) {
        btn.classList.add("correct");
      }
    });
  }

  setTimeout(() => {
    current++;
    if (current < questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }, 1200);
}

function showResult() {
  document.getElementById("quizArea").classList.add("hidden");
  document.getElementById("resultArea").classList.remove("hidden");

  const percent = Math.round(score / questions.length * 100);

  document.getElementById("resultText").innerHTML =
    `${questions.length}?? ${score}????<br>????${percent}%`;
}
